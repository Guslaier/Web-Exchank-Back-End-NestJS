version: '3.8'

services:
  nginx-proxy:
    image: nginx:latest
    container_name: web-exchank-proxy
    ports:
      - "80:80" # เข้าผ่านหน้าเว็บปกติ
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    # บรรทัดนี้สำคัญมาก เพื่อให้ Docker มองเห็น localhost (host.docker.internal)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

    
  db:
    image: postgres:16-alpine
    container_name: web-exchank-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web_exchank
      TZ: Asia/Bangkok
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: web-exchank-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data 
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev: 